name: Strip node_modules from history
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: pip install git-filter-repo --break-system-packages

      - name: Configure git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Strip node_modules from history
        run: git filter-repo --invert-paths --path node_modules --force

      - name: Force push rewritten history
        run: |
          git remote add origin-rw https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin-rw --force --all
          git push origin-rw --force --tags
