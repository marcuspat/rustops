# Prometheus configuration for testing

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    test_env: 'rustops_integration'

scrape_configs:
  - job_name: 'rustops-test'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          env: 'test'

  - job_name: 'rustops-api'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'api'

  - job_name: 'rustops-agents'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'agent'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']
