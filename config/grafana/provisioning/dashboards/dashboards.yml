# Grafana dashboard provisioning

apiVersion: 1

providers:
  - name: 'RustOps Dashboards'
    orgId: 1
    folder: 'RustOps'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
