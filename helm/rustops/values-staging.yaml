# Staging environment values

global:
  environment: staging

api:
  replicaCount: 2
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

agent:
  replicaCount: 2
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

pipeline:
  replicaCount: 1

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: true
