# Default values for RustOps
global:
  # Common environment for all components
  environment: production

  # Image registry
  imageRegistry: ghcr.io/rustops/rustops

  # Image pull policy
  imagePullPolicy: IfNotPresent

  # Image pull secrets (if using private registry)
  imagePullSecrets: []

  # Common annotations
  annotations: {}

  # Common labels
  labels: {}

  # Resource limits
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# API Service Configuration
api:
  enabled: true
  replicaCount: 3

  image:
    repository: api
    tag: latest
    pullPolicy: IfNotPresent

  # Container settings
  container:
    port: 8080
    protocol: TCP

  # Service settings
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
    annotations: {}

  # Ingress settings
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: rustops.io
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Liveness probe
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # Readiness probe
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Environment variables
  env: []
  #  - name: RUST_LOG
  #    value: debug

  # Resources
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Pod annotations
  podAnnotations: {}

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - rustops-api
            topologyKey: kubernetes.io/hostname

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Agent Service Configuration
agent:
  enabled: true
  replicaCount: 3

  image:
    repository: agent
    tag: latest
    pullPolicy: IfNotPresent

  container:
    port: 8081
    protocol: TCP

  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
    annotations: {}

  livenessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  nodeSelector: {}
  tolerations: []
  affinity: {}

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Pipeline Service Configuration
pipeline:
  enabled: true
  replicaCount: 2

  image:
    repository: pipeline
    tag: latest
    pullPolicy: IfNotPresent

  container:
    port: 9090
    protocol: TCP

  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
    annotations: {}

  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - pgrep -f rustops-pipeline
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - pgrep -f rustops-pipeline
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  nodeSelector: {}
  tolerations: []
  affinity: {}

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list", "watch", "create", "update"]

# ConfigMap
configMap:
  create: true
  data: {}

# Secret
secret:
  create: true
  data: {}

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
  prometheusRules:
    enabled: false

# Traffic Splitting (for rollouts)
trafficSplit:
  enabled: false
  percentage: 100
  backendService: rustops-api
