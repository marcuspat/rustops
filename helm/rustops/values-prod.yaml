# Production environment values

global:
  environment: production
  imagePullPolicy: IfNotPresent

api:
  replicaCount: 3
  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

agent:
  replicaCount: 3
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

pipeline:
  replicaCount: 2
  resources:
    limits:
      cpu: 3000m
      memory: 2Gi
    requests:
      cpu: 300m
      memory: 512Mi

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: true
